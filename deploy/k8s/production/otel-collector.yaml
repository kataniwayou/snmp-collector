# Production OTel Collector - ConfigMap + Deployment + Service
# Changes from dev:
#   - logstash_format.enabled: true for daily Elasticsearch indices (simetra-logs-YYYY.MM.DD)
#   - imagePullPolicy: IfNotPresent for air-gapped operation
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: simetra
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      transform:
        metric_statements:
          - context: datapoint
            statements:
              - set(attributes["host_name"], resource.attributes["service.instance.id"])

    exporters:
      prometheusremotewrite:
        endpoint: http://prometheus:9090/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true

      elasticsearch:
        endpoints:
          - http://elasticsearch:9200
        logs_index: simetra-logs
        logstash_format:
          enabled: true
        sending_queue:
          enabled: true
        flush:
          bytes: 1024
          interval: 1s

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [transform]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          exporters: [elasticsearch]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: simetra
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.120.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4317
          name: otlp-grpc
          protocol: TCP
        - containerPort: 8889
          name: prom-exporter
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/otelcol-contrib/config.yaml
          subPath: config.yaml
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: simetra
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: otlp-grpc
  - name: prom-exporter
    port: 8889
    targetPort: prom-exporter
