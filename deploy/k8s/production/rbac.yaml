apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: simetra-role
  namespace: simetra
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: simetra-binding
  namespace: simetra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: simetra-role
subjects:
- kind: ServiceAccount
  name: simetra-sa
  namespace: simetra
