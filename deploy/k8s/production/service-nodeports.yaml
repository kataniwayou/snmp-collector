# =============================================================================
# NodePort Services -- External access to production components
# =============================================================================
# These Services expose internal cluster ports to the Minikube VM's IP address.
# Operators access UIs from their RDP session at http://<minikube-ip>:<nodePort>.
# Real devices send SNMP traps to <minikube-ip>:30162 (UDP).
#
# Port assignments:
#   30162/UDP  -- SNMP traps (snmp-collector pod)
#   30090/TCP  -- Prometheus UI
#   30092/TCP  -- Elasticsearch API
#   30030/TCP  -- Grafana UI (pre-created for Phase 36)
#
# Usage:
#   kubectl apply -f deploy/k8s/production/service-nodeports.yaml
#
# Verify:
#   kubectl get svc -n simetra -o wide
# =============================================================================

# -----------------------------------------------------------------------------
# Service 1: SNMP Trap NodePort
# Devices send UDP traps to <minikube-ip>:30162
# This routes to the snmp-collector pod's named port "snmp" (10162/UDP)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: snmp-collector-snmp-traps
  namespace: simetra
  labels:
    app: snmp-collector
spec:
  type: NodePort
  selector:
    app: snmp-collector
  ports:
  - name: snmp-trap
    port: 10162
    targetPort: snmp
    nodePort: 30162
    protocol: UDP
---
# -----------------------------------------------------------------------------
# Service 2: Prometheus NodePort
# Operator accesses Prometheus at http://<minikube-ip>:30090
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: prometheus-nodeport
  namespace: simetra
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
  - name: http
    port: 9090
    targetPort: http
    nodePort: 30090
    protocol: TCP
---
# -----------------------------------------------------------------------------
# Service 3: Elasticsearch NodePort
# Operator accesses Elasticsearch at http://<minikube-ip>:30092
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-nodeport
  namespace: simetra
  labels:
    app: elasticsearch
spec:
  type: NodePort
  selector:
    app: elasticsearch
  ports:
  - name: http
    port: 9200
    targetPort: http
    nodePort: 30092
    protocol: TCP
---
# -----------------------------------------------------------------------------
# Service 4: Grafana NodePort
# Pre-created for Phase 36 Grafana deployment.
# Operator accesses Grafana at http://<minikube-ip>:30030
# NOTE: This Service will have no endpoints until Phase 36 deploys the
# Grafana pod. This is normal and harmless -- the selector will automatically
# match once the Grafana Deployment is applied.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: simetra
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - name: http
    port: 3000
    targetPort: http
    nodePort: 30030
    protocol: TCP
