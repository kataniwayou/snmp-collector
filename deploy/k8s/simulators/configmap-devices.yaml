# Template ConfigMap with NPB and OBP device entries.
# This replaces the base simetra-config ConfigMap (same name, same namespace).
#
# PLACEHOLDER_NPB_POD_IP and PLACEHOLDER_OBP_POD_IP must be replaced with
# actual simulator pod IPs at deployment time. The verification script
# (verify-device-pipeline.ps1) discovers pod IPs dynamically and generates
# the final ConfigMap from this template.
#
# Usage:
#   1. Deploy simulator pods (npb-deployment.yaml, obp-deployment.yaml)
#   2. Wait for pods to be Ready
#   3. Discover pod IPs via kubectl
#   4. Replace placeholders and apply via kubectl apply -f -
#   5. Rollout restart Simetra deployment
apiVersion: v1
kind: ConfigMap
metadata:
  name: simetra-config
  namespace: simetra
data:
  appsettings.k8s.json: |
    {
      "Site": {
        "Name": "site-lab-01"
      },
      "Otlp": {
        "Endpoint": "http://otel-collector:4317",
        "ServiceName": "simetra-supervisor"
      },
      "SnmpListener": {
        "Port": 10162
      },
      "Devices": [
        {
          "Name": "NPB-01",
          "IpAddress": "PLACEHOLDER_NPB_POD_IP",
          "DeviceType": "NPB",
          "MetricPolls": [
            {
              "MetricName": "npb_cpu_util",
              "MetricType": "Gauge",
              "Oids": [
                {
                  "Oid": "1.3.6.1.4.1.47477.100.1.1.0",
                  "PropertyName": "npb_cpu_util",
                  "Role": "Metric"
                }
              ],
              "IntervalSeconds": 30
            },
            {
              "MetricName": "npb_port_rx_octets_P1",
              "MetricType": "Counter",
              "Oids": [
                {
                  "Oid": "1.3.6.1.4.1.47477.100.2.1.2.0",
                  "PropertyName": "npb_port_rx_octets_P1",
                  "Role": "Metric"
                }
              ],
              "IntervalSeconds": 30
            },
            {
              "MetricName": "npb_port_status_P1",
              "MetricType": "Gauge",
              "Oids": [
                {
                  "Oid": "1.3.6.1.4.1.47477.100.2.1.1.0",
                  "PropertyName": "npb_port_status_P1",
                  "Role": "Metric"
                }
              ],
              "IntervalSeconds": 30
            }
          ]
        },
        {
          "Name": "OBP-01",
          "IpAddress": "PLACEHOLDER_OBP_POD_IP",
          "DeviceType": "OBP",
          "MetricPolls": [
            {
              "MetricName": "obp_link_state_L1",
              "MetricType": "Gauge",
              "Oids": [
                {
                  "Oid": "1.3.6.1.4.1.47477.10.21.1.3.1.0",
                  "PropertyName": "obp_link_state_L1",
                  "Role": "Metric"
                }
              ],
              "IntervalSeconds": 30
            },
            {
              "MetricName": "obp_r1_power_L1",
              "MetricType": "Gauge",
              "Oids": [
                {
                  "Oid": "1.3.6.1.4.1.47477.10.21.1.3.10.0",
                  "PropertyName": "obp_r1_power_L1",
                  "Role": "Metric"
                }
              ],
              "IntervalSeconds": 30
            },
            {
              "MetricName": "obp_channel_L1",
              "MetricType": "Gauge",
              "Oids": [
                {
                  "Oid": "1.3.6.1.4.1.47477.10.21.1.3.4.0",
                  "PropertyName": "obp_channel_L1",
                  "Role": "Metric"
                }
              ],
              "IntervalSeconds": 30
            }
          ]
        }
      ],
      "Logging": {
        "EnableConsole": true
      }
    }
